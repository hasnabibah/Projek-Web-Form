<html>
<html>
<head>
<title> Tugas Form </title>
<style>
body{
    background-color: #E8CCED;
    font-family: Arial;
	background: linear-gradient(to bottom, #E8CCED, #80558A);
}

h1{
    text-align: center;
    color: #3E164D;
	font-size:45px;
	margin-top:2.5%;
}

table{
    margin: auto;
    background-color: #EBD8EB;
    padding: 25px;
    border-radius: 10px;
}

td{
    padding: 20px;
}

input[type="text"]{
    width: 100%;
    padding: 5px;
}

canvas{
    display: block;
    margin: 20px auto;
    border: 2px solid #594113;
    border-radius: 10px;
}

svg{
    display: block;
    margin: 20px auto;
}
</style>
</head>

<body>

<h1 style=font-family:"bradley hand"; > FORMULIR PENDAFTARAN PASIEN </h1>

<!-- SVG (Header Dekorasi) -->
<svg width="400" height="100">
  <rect width="400" height="100" fill="#F6E4F7" rx="15"/>
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-size="35" fill="#3E164D" font-family="bradley hand" font-weight="bold">
    KLINIK ZHAFIRA 
  </text>
</svg>

<form action="#">
<table style="margin-top:2.5%">
<tr>
<td>Nama Kepala Keluarga</td>
<td><input type="text" name="kk"></td>
</tr>

<tr>
<td>Nomor Identitas</td>
<td><input type="text" name="NoIdn"></td>
</tr>

<tr>
<td>Nama Pasien</td>
<td><input type="text" name="NamaP"></td>
</tr>

<tr>
<td>TTL</td>
<td><input type="text" name="TTL"></td>
</tr>

<tr>
<td>Jenis Kelamin</td>
<td>
<input type="radio" name="jk"> Laki-laki <br>
<input type="radio" name="jk"> Perempuan
</td>
</tr>

<tr>
<td>Status</td>
<td>
<input type="radio" name="status"> Belum Menikah <br>
<input type="radio" name="status"> Menikah <br>
<input type="radio" name="status"> Cerai
</td>
</tr>

<tr>
<td>Poli</td>
<td>
<input type="radio" name="dokter"> Umum <br>
<input type="radio" name="dokter"> Gigi <br>
<input type="radio" name="dokter"> Spesialis
</td>
</tr>

<tr>
<td>Riwayat Penyakit</td>
<td>
<input type="checkbox"> Asma <br>
<input type="checkbox"> Hipertensi <br>
<input type="checkbox"> Diabetes
</td>
</tr>

<tr>
<td colspan="2" align="center">
<input type="submit" value="Submit">
</td>
</tr>
</table>
</form>

<!-- CANVAS (Gambar Medis Sederhana) -->
<canvas id="myCanvas" width="300" height="200"></canvas>

<script>
var c = document.getElementById("myCanvas");
var ctx = c.getContext("2d");

ctx.fillStyle = "#F6E4F7";
ctx.fillRect(0,0,300,200);

ctx.beginPath();
ctx.arc(150,80,40,0,2*Math.PI);
ctx.fillStyle = "#BD89C7";
ctx.fill();

ctx.fillRect(110,120,80,50);

ctx.fillStyle = "#3E164D";
ctx.font = "14px Arial";
ctx.textAlign = "center";   
ctx.fillText("Data Pasien", 150, 180);
</script>

</body>
</html>
